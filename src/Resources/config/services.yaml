services:
    _defaults:
        autowire: true
        public: false
        autoconfigure: true

    Lle\HermesBundle\:
        resource: '../../../src/*'
        exclude: '../../../src/{DependencyInjection,Entity,Translatable,Resources,Enum,LleHermesBundle.php}'

    Lle\HermesBundle\Service\Sender:
        arguments:
            - '@doctrine.orm.entity_manager'
            - '@Lle\HermesBundle\Repository\EmailErrorRepository'
            - '@mailer.mailer'
            - '@Lle\HermesBundle\Service\MailBuilder'
            - '@parameter_bag'
            - '@Lle\HermesBundle\Repository\RecipientRepository'
            - '@Lle\HermesBundle\Repository\UnsubscribeEmailRepository'

    Lle\HermesBundle\Request\TemplateValueResolver:
        autowire: true
        autoconfigure: false
        tags:
            - { name: controller.argument_value_resolver, priority: 110 }

    Lle\HermesBundle\Service\MailError\MailRecoverer:
        arguments:
            - '@doctrine.orm.entity_manager'
            - '@Lle\HermesBundle\Service\MailError\MailAnalyzer'
            - '@parameter_bag'
